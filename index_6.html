<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戸田市公園ガイド | koengide.com</title>
<meta name="description" content="埼玉県戸田市の公園情報を遊具・トイレ・水遊びで絞り込み検索。地図で場所を確認しながらお出かけ先を見つけよう。">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3B7A3B;
    --green-light: #EAF3DE;
    --green-mid: #639922;
    --accent: #5A9E3A;
    --text: #1a1a1a;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --bg: #ffffff;
    --bg-soft: #f9fafb;
    --radius: 12px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; color: var(--text); background: var(--bg); font-size: 15px; }
  a { color: inherit; text-decoration: none; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--green); display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { font-size: 16px; font-weight: 700; color: var(--green); }
  .logo-domain { font-size: 11px; color: var(--text-muted); }
  .header-stats {
    margin-left: auto; display: flex; gap: 1rem; align-items: center;
  }
  .hstat { text-align: center; }
  .hstat-num { font-size: 16px; font-weight: 700; color: var(--green); }
  .hstat-lbl { font-size: 10px; color: var(--text-muted); }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #EAF3DE 0%, #d4edba 100%);
    padding: 2rem 1rem 1.5rem;
    text-align: center;
  }
  .hero h1 { font-size: 1.5rem; font-weight: 700; color: var(--green); line-height: 1.4; margin-bottom: 0.5rem; }
  .hero p { font-size: 13px; color: #4a7a2a; line-height: 1.6; }

  /* Filter */
  .filter-section { background: var(--bg); padding: 1rem; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 0.5rem; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .chip:hover { border-color: var(--green-mid); color: var(--green); }
  .chip.active { background: var(--green-light); border-color: var(--green-mid); color: var(--green); }
  .chip-reset { color: #ef4444; border-color: #fecaca; }
  .chip-reset:hover { background: #fef2f2; border-color: #ef4444; }

  /* Map */
  #map { height: 250px; width: 100%; z-index: 1; }

  /* Results */
  .results-header {
    padding: 0.75rem 1rem; font-size: 13px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); background: var(--bg-soft);
    display: flex; align-items: center; justify-content: space-between;
  }
  .results-count { font-weight: 500; color: var(--text); }

  /* Park list */
  .park-list { padding: 0.5rem; }
  .park-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
    margin-bottom: 8px; cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
    position: relative;
  }
  .park-card:hover { box-shadow: var(--shadow-md); border-color: #c3e6a0; }
  .park-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.4rem; }
  .park-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .park-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--green); color: white;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-left: 0.5rem;
  }
  .park-address {
    font-size: 12px; color: var(--text-muted); margin-bottom: 0.6rem;
    display: flex; align-items: center; gap: 4px;
  }
  .park-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px;
    display: flex; align-items: center; gap: 3px;
  }
  .tag-swing { background: #EAF3DE; color: #3B6D11; }
  .tag-slide { background: #E6F1FB; color: #185FA5; }
  .tag-sandbox { background: #FAEEDA; color: #854F0B; }
  .tag-toilet { background: #EEEDFE; color: #534AB7; }
  .tag-water { background: #E1F5EE; color: #0F6E56; }
  .tag-parking { background: #F1EFE8; color: #5F5E5A; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-muted); font-size: 14px;
  }
  .empty-state-icon { font-size: 3rem; margin-bottom: 0.5rem; }

  /* Loading */
  .loading {
    text-align: center; padding: 2rem;
    color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: var(--text); color: white; padding: 0.6rem 1.2rem;
    border-radius: 20px; font-size: 13px; z-index: 9999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Footer */
  footer {
    background: var(--bg-soft); border-top: 1px solid var(--border);
    padding: 1.5rem 1rem; text-align: center;
    font-size: 12px; color: var(--text-muted); margin-top: 2rem;
  }
  footer a { color: var(--green); }

  /* Section divider */
  .section-label {
    padding: 0.5rem 1rem; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-muted); background: var(--bg-soft);
    border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🌳</div>
  <div>
    <div class="logo-text">公園ガイド 戸田市</div>
    <div class="logo-domain">koengide.com</div>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-num" id="total-count">-</div>
      <div class="hstat-lbl">公園数</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="toilet-count">-</div>
      <div class="hstat-lbl">トイレあり</div>
    </div>
    <div class="hstat">
      <div class="hstat-num" id="water-count">-</div>
      <div class="hstat-lbl">水遊びあり</div>
    </div>
  </div>
</header>

<section class="hero">
  <h1>戸田市のすべての公園を、<br>かんたんに探せる。</h1>
  <p>遊具・トイレ・水遊びから絞り込み。地図で場所を確認しながら、<br>今日のお出かけ先を見つけよう。</p>
</section>

<section class="filter-section">
  <div class="filter-label">🔍 絞り込み</div>
  <div class="filter-chips">
    <div class="chip" data-filter="has_swing" onclick="toggleFilter(this)">🏃 ブランコ</div>
    <div class="chip" data-filter="has_slide" onclick="toggleFilter(this)">⬇️ すべり台</div>
    <div class="chip" data-filter="has_sandbox" onclick="toggleFilter(this)">🟫 砂場</div>
    <div class="chip" data-filter="has_toilet" onclick="toggleFilter(this)">🚻 トイレ</div>
    <div class="chip" data-filter="has_water" onclick="toggleFilter(this)">💧 水遊び</div>
    <div class="chip chip-reset" onclick="resetFilters()">✕ リセット</div>
  </div>
</section>

<div class="section-label">📍 地図で探す</div>
<div id="map"></div>

<div class="results-header">
  <span id="results-text" class="results-count">読み込み中...</span>
</div>

<div id="park-list" class="park-list">
  <div class="loading">
    <div class="spinner"></div>
    <div>公園データを読み込んでいます...</div>
  </div>
</div>

<footer>
  <p>© 2025 <a href="https://www.koengide.com">koengide.com</a> — 埼玉県戸田市の公園情報サイト</p>
  <p style="margin-top:0.4rem">情報は随時更新中。最新情報は各公園の案内板をご確認ください。</p>
</footer>

<div class="toast" id="toast"></div>

<!-- ✅ CDN読み込みに変更 -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = 'https://cxqzrbghdibahedstrrv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Jceze5gKAJ6VQbZc4_p8HA_aMNPCEXa';

const SAMPLE_PARKS = [
  { id:1, name:'こどもの国（児童センター）', address:'本町1-17-7', lat:35.8097, lng:139.6804, has_swing:false, has_slide:false, has_sandbox:true, has_toilet:true, has_water:true, has_parking:false, notes:'屋外アスレチック・恐竜・屋内砂場・プール（夏）。無料。' },
  { id:2, name:'本村公園', address:'本町3-12', lat:35.8104, lng:139.6706, has_swing:false, has_slide:true, has_sandbox:true, has_toilet:true, has_water:false, has_parking:false, notes:'すべり台（大小）・スプリング×3・春は桜が綺麗' },
  { id:3, name:'大前公園', address:'本町2-15', lat:35.8081, lng:139.6747, has_swing:false, has_slide:true, has_sandbox:false, has_toilet:true, has_water:true, has_parking:false, notes:'2024年リニューアル。夏は噴水あり。' },
  { id:4, name:'東町公園', address:'上戸田2-40', lat:35.8135, lng:139.6779, has_swing:false, has_slide:true, has_sandbox:true, has_toilet:true, has_water:true, has_parking:false, notes:'複合すべり台・バナナ型すべり台など種類豊富' },
  { id:5, name:'元蕨第三公園', address:'上戸田2-9', lat:35.8138, lng:139.6813, has_swing:false, has_slide:true, has_sandbox:true, has_toilet:true, has_water:false, has_parking:false, notes:'すべり台（大小）・スプリング・旧戸田城跡付近' },
  { id:6, name:'南町児童公園', address:'南町7', lat:35.8059, lng:139.6727, has_swing:true, has_slide:true, has_sandbox:true, has_toilet:false, has_water:false, has_parking:false, notes:'木陰多い・自転車練習OK' },
  { id:7, name:'南町児童遊園地', address:'南町4', lat:35.8063, lng:139.6725, has_swing:true, has_slide:true, has_sandbox:false, has_toilet:false, has_water:false, has_parking:false, notes:'スプリング遊具あり' },
  { id:8, name:'曲尺手遊園地', address:'南町8', lat:35.8064, lng:139.6722, has_swing:true, has_slide:true, has_sandbox:true, has_toilet:false, has_water:false, has_parking:false, notes:'春の桜が美しい小さな公園' },
  { id:9, name:'川岸3丁目遊園地', address:'川岸3-7', lat:35.8032, lng:139.6817, has_swing:true, has_slide:true, has_sandbox:true, has_toilet:true, has_water:false, has_parking:false, notes:'毎週土曜「ウーフ文庫」本の無料貸し出しあり' },
  { id:10, name:'戸田橋親水公園', address:'川岸3-7-19', lat:35.8027, lng:139.6819, has_swing:false, has_slide:false, has_sandbox:false, has_toilet:true, has_water:true, has_parking:false, notes:'せせらぎ水遊び（夏）・花火大会の名所' },
];

let allParks = [];
let activeFilters = new Set();
let map, markers = [];

function initMap() {
  map = L.map('map').setView([35.810, 139.675], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
}

function createMarker(park, index) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:#3B7A3B;color:white;border-radius:50%;
      width:26px;height:26px;display:flex;align-items:center;
      justify-content:center;font-size:11px;font-weight:700;
      border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);
      cursor:pointer;
    ">${index + 1}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13]
  });

  const popupContent = `
    <div style="font-family:'Noto Sans JP',sans-serif;min-width:160px;">
      <div style="font-weight:700;font-size:14px;margin-bottom:4px;">${park.name}</div>
      <div style="font-size:12px;color:#6b7280;margin-bottom:6px;">📍 ${park.address}</div>
      ${park.notes ? `<div style="font-size:11px;color:#4a7a2a;background:#EAF3DE;padding:4px 6px;border-radius:6px;">${park.notes}</div>` : ''}
    </div>
  `;

  const marker = L.marker([park.lat, park.lng], { icon })
    .bindPopup(popupContent)
    .addTo(map);
  return marker;
}

function updateMarkers(parks) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  parks.forEach((park, i) => {
    if (park.lat && park.lng) {
      markers.push(createMarker(park, i));
    }
  });
  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }
}

function buildTags(park) {
  const tags = [];
  if (park.has_swing)   tags.push('<span class="tag tag-swing">🏃 ブランコ</span>');
  if (park.has_slide)   tags.push('<span class="tag tag-slide">⬇️ すべり台</span>');
  if (park.has_sandbox) tags.push('<span class="tag tag-sandbox">🟫 砂場</span>');
  if (park.has_toilet)  tags.push('<span class="tag tag-toilet">🚻 トイレ</span>');
  if (park.has_water)   tags.push('<span class="tag tag-water">💧 水遊び</span>');
  if (park.has_parking) tags.push('<span class="tag tag-parking">🅿️ 駐車場</span>');
  return tags.join('');
}

function renderParks(parks) {
  const list = document.getElementById('park-list');
  const resultsText = document.getElementById('results-text');

  if (parks.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🌿</div>
        <div>条件に合う公園が見つかりませんでした</div>
        <div style="margin-top:0.5rem;font-size:12px;">絞り込み条件を変えてみてください</div>
      </div>`;
    resultsText.textContent = '0件の公園が見つかりました';
    updateMarkers([]);
    return;
  }

  resultsText.textContent = `${parks.length}件の公園が見つかりました`;
  list.innerHTML = parks.map((park, i) => `
    <div class="park-card" onclick="focusMarker(${i})">
      <div class="park-card-top">
        <div class="park-name">${park.name}</div>
        <div class="park-num">${i + 1}</div>
      </div>
      <div class="park-address">📍 戸田市${park.address}</div>
      <div class="park-tags">${buildTags(park)}</div>
      ${park.notes ? `<div style="font-size:12px;color:#4a7a2a;margin-top:0.5rem;line-height:1.5;">${park.notes}</div>` : ''}
    </div>
  `).join('');

  updateMarkers(parks);
}

function focusMarker(index) {
  if (markers[index]) {
    map.setView(markers[index].getLatLng(), 16);
    markers[index].openPopup();
    window.scrollTo({ top: document.getElementById('map').offsetTop - 60, behavior: 'smooth' });
  }
}

function getFilteredParks() {
  if (activeFilters.size === 0) return allParks;
  return allParks.filter(park =>
    [...activeFilters].every(f => park[f])
  );
}

function toggleFilter(el) {
  const f = el.dataset.filter;
  if (activeFilters.has(f)) {
    activeFilters.delete(f);
    el.classList.remove('active');
  } else {
    activeFilters.add(f);
    el.classList.add('active');
  }
  renderParks(getFilteredParks());
}

function resetFilters() {
  activeFilters.clear();
  document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
  renderParks(allParks);
}

function updateStats(parks) {
  document.getElementById('total-count').textContent = parks.length;
  document.getElementById('toilet-count').textContent = parks.filter(p => p.has_toilet).length;
  document.getElementById('water-count').textContent = parks.filter(p => p.has_water).length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function fetchParks() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/parks?select=*&order=name`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      }
    });
    if (!res.ok) throw new Error('Supabase error');
    const data = await res.json();
    return data && data.length > 0 ? data : null;
  } catch (e) {
    return null;
  }
}

async function init() {
  initMap();
  const data = await fetchParks();
  if (data) {
    allParks = data;
    showToast('✅ データを読み込みました');
  } else {
    allParks = SAMPLE_PARKS;
    showToast('📋 サンプルデータを表示中');
  }
  updateStats(allParks);
  renderParks(allParks);
}

init();
</script>

</body></html>
