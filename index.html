<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戸田市公園ガイド | 遊具・水遊び・犬の散歩で探せる</title>
  <meta name="description" content="戸田市の公園88件を掲載。ブランコ・すべり台・砂場・水遊び・犬の散歩OKで絞り込みできる公園検索サイト。" />
  <!-- Google Search Console 確認タグ -->
  <meta name="google-site-verification" content="K-LyPaQChEx_y6KwRHGp-JkaWfyg-OQtCTHlODVA_3g" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TY1M6QFYVZ"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green-dark:   #1a4a2e;
      --green-mid:    #2d6a4f;
      --green-light:  #52b788;
      --green-pale:   #d8f3dc;
      --lime:         #95d5b2;
      --accent:       #f4a261;
      --accent-dark:  #e76f51;
      --cream:        #fafaf7;
      --white:        #ffffff;
      --gray-100:     #f0f0ee;
      --gray-300:     #d0d0cc;
      --gray-500:     #888884;
      --gray-700:     #444440;
      --text:         #1e1e1a;
      --area-color:   #3d6b9e;
      --area-pale:    #ddeaf7;
      --radius-sm:    8px;
      --radius-md:    14px;
      --radius-lg:    22px;
      --shadow-sm:    0 2px 8px rgba(0,0,0,.08);
      --shadow-md:    0 6px 20px rgba(0,0,0,.12);
      --shadow-lg:    0 16px 48px rgba(0,0,0,.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .hero {
      position: relative;
      background: linear-gradient(180deg, #87CEEB 0%, #b8e4f7 45%, #7ec850 45%, #5aab32 100%);
      overflow: hidden;
      padding: 0;
    }
    .hero-sun {
      position: absolute;
      top: 18px; right: 10%;
      width: 72px; height: 72px;
      background: radial-gradient(circle, #ffe066 60%, #ffd000 100%);
      border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(255,224,102,.25), 0 0 0 22px rgba(255,224,102,.12);
      animation: sun-pulse 3s ease-in-out infinite;
    }
    @keyframes sun-pulse {
      0%,100% { box-shadow: 0 0 0 10px rgba(255,224,102,.25), 0 0 0 22px rgba(255,224,102,.12); }
      50%      { box-shadow: 0 0 0 14px rgba(255,224,102,.3),  0 0 0 30px rgba(255,224,102,.14); }
    }
    .hero-cloud {
      position: absolute;
      background: rgba(255,255,255,.88);
      border-radius: 100px;
      filter: blur(1px);
    }
    .hero-cloud::before, .hero-cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .hero-cloud-1 {
      top: 28px; left: 8%;
      width: 90px; height: 28px;
      animation: cloud-drift 18s linear infinite;
    }
    .hero-cloud-1::before { width: 42px; height: 42px; top: -20px; left: 14px; }
    .hero-cloud-1::after  { width: 30px; height: 30px; top: -14px; left: 44px; }
    .hero-cloud-2 {
      top: 14px; left: 35%;
      width: 70px; height: 22px;
      animation: cloud-drift 24s linear infinite;
      opacity: .75;
    }
    .hero-cloud-2::before { width: 32px; height: 32px; top: -16px; left: 10px; }
    .hero-cloud-2::after  { width: 22px; height: 22px; top: -12px; left: 34px; }
    @keyframes cloud-drift {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(18px); }
      100% { transform: translateX(0); }
    }
    .hero-hills {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 54%;
      pointer-events: none;
    }
    .hero-tree {
      position: absolute;
      bottom: 52%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero-tree-top {
      background: #2d8a1e;
      border-radius: 50% 50% 40% 40%;
    }
    .hero-tree-trunk {
      background: #8B5E3C;
      border-radius: 2px;
    }
    .tree-l { left: 2%; }
    .tree-l .hero-tree-top  { width: 52px; height: 64px; }
    .tree-l .hero-tree-trunk { width: 10px; height: 22px; }
    .tree-r { right: 4%; }
    .tree-r .hero-tree-top  { width: 44px; height: 54px; background: #3aab24; }
    .tree-r .hero-tree-trunk { width: 8px; height: 18px; }
    .tree-m { right: 16%; }
    .tree-m .hero-tree-top  { width: 36px; height: 46px; background: #4dbf2e; }
    .tree-m .hero-tree-trunk { width: 7px; height: 14px; }
    .hero-birds {
      position: absolute;
      top: 48px; left: 20%;
      animation: birds-fly 6s ease-in-out infinite;
    }
    @keyframes birds-fly {
      0%,100% { transform: translateY(0) translateX(0); }
      50%      { transform: translateY(-6px) translateX(10px); }
    }
    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 960px;
      margin: 0 auto;
      padding: 36px 24px 52px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.85);
      border: none;
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--green-dark);
      letter-spacing: .05em;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .hero-badge span { font-size: 14px; }
    .hero-title {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(24px, 5.5vw, 42px);
      font-weight: 900;
      color: var(--white);
      line-height: 1.28;
      letter-spacing: .01em;
      text-shadow: 0 2px 12px rgba(30,80,40,.35), 0 1px 3px rgba(0,0,0,.2);
    }
    .hero-title em {
      font-style: normal;
      color: #fff176;
      text-shadow: 0 2px 12px rgba(180,140,0,.4);
    }
    .hero-sub {
      font-size: clamp(13px, 2.5vw, 14px);
      color: #1a3d20;
      line-height: 1.75;
      max-width: 480px;
      background: rgba(255,255,255,.72);
      border-radius: 10px;
      padding: 8px 12px;
      backdrop-filter: blur(4px);
      margin-top: 8px;
    }
    .hero-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
    .hero-stat {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,.85);
      border-radius: 14px;
      padding: 8px 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }
    .hero-stat-num {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--green-dark);
      line-height: 1;
    }
    .hero-stat-num small { font-size: 13px; }
    .hero-stat-label { font-size: 10px; color: var(--gray-500); margin-top: 2px; letter-spacing: .06em; }

    /* ===== フィルターセクション ===== */
    .filter-section {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .filter-inner { max-width: 960px; margin: 0 auto; padding: 10px 16px 12px; }
    .filter-row { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { font-size: 11px; font-weight: 700; color: var(--gray-500); letter-spacing: .1em; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }

    /* 設備チップ（緑） */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-700);
      cursor: pointer;
      transition: all .18s ease;
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: var(--green-light); color: var(--green-mid); background: var(--green-pale); }
    .chip.active { background: var(--green-mid); border-color: var(--green-mid); color: var(--white); box-shadow: 0 2px 8px rgba(45,106,79,.3); }
    .chip.active:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .chip-icon { font-size: 16px; }

    /* エリアチップ（青系） */
    .area-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 100px;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-700);
      cursor: pointer;
      transition: all .18s ease;
      white-space: nowrap;
      user-select: none;
    }
    .area-chip:hover { border-color: #7aaed4; color: var(--area-color); background: var(--area-pale); }
    .area-chip.active { background: var(--area-color); border-color: var(--area-color); color: var(--white); box-shadow: 0 2px 8px rgba(61,107,158,.3); }
    .area-chip.active:hover { background: #2d5580; border-color: #2d5580; }

    /* フィルター区切り線 */
    .filter-divider {
      border: none;
      border-top: 1px dashed var(--gray-300);
      margin: 2px 0;
    }

    .main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }
    .result-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .result-count { font-size: 13px; color: var(--gray-500); }
    .result-count strong { color: var(--green-mid); font-size: 18px; font-weight: 700; }
    .parks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .park-card { background: var(--white); border-radius: var(--radius-md); border: 1.5px solid var(--gray-100); padding: 16px; cursor: pointer; transition: all .2s ease; display: flex; flex-direction: column; gap: 10px; }
    .park-card:hover { border-color: var(--green-light); box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .park-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .park-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.4; flex: 1; }
    .park-arrow { font-size: 18px; color: var(--gray-300); flex-shrink: 0; transition: transform .18s; }
    .park-card:hover .park-arrow { transform: translateX(3px); color: var(--green-light); }
    .park-address { font-size: 11px; color: var(--gray-500); display: flex; align-items: center; gap: 4px; }
    .park-area-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--area-pale);
      color: var(--area-color);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 600;
    }
    .park-features { display: flex; gap: 6px; flex-wrap: wrap; }
    .feat-tag { display: inline-flex; align-items: center; gap: 3px; background: var(--green-pale); color: var(--green-mid); border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 500; }
    .feat-tag.dog { background: #fff3e0; color: #e65100; }
    .feat-tag.water { background: #e3f2fd; color: #1565c0; }
    .park-detail-btn { margin-top: 4px; padding: 9px 0; border-radius: var(--radius-sm); border: 1.5px solid var(--green-light); background: transparent; color: var(--green-mid); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; font-family: inherit; }
    .park-detail-btn:hover { background: var(--green-mid); color: var(--white); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(10,20,15,.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--white); width: 100%; max-width: 640px; max-height: 90dvh; border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow-y: auto; overscroll-behavior: contain; transform: translateY(60px); transition: transform .3s cubic-bezier(.22,.61,.36,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle { width: 40px; height: 4px; background: var(--gray-300); border-radius: 100px; margin: 12px auto 0; }
    .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; position: sticky; top: 0; background: var(--white); z-index: 1; }
    .modal-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.3; color: var(--green-dark); }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; color: var(--gray-700); }
    .modal-close:hover { background: var(--gray-300); }
    .modal-body { padding: 16px 20px 32px; display: flex; flex-direction: column; gap: 20px; }
    .photo-area { background: var(--gray-100); border-radius: var(--radius-md); min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border: 2px dashed var(--gray-300); padding: 24px; text-align: center; }
    .photo-area-icon { font-size: 36px; opacity: .4; }
    .photo-area-text { font-size: 13px; color: var(--gray-500); line-height: 1.6; }
    .photo-area-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--accent); color: var(--white); border-radius: 100px; padding: 4px 12px; font-size: 11px; font-weight: 700; }
    .info-section-title { font-size: 12px; font-weight: 700; color: var(--gray-500); letter-spacing: .1em; margin-bottom: 10px; }
    .equip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .equip-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--gray-100); font-size: 11px; font-weight: 500; text-align: center; color: var(--gray-500); transition: all .15s; }
    .equip-item.has { border-color: var(--green-pale); background: var(--green-pale); color: var(--green-mid); }
    .equip-item.has-dog { border-color: #ffe0b2; background: #fff8f0; color: #e65100; }
    .equip-item.has-water { border-color: #bbdefb; background: #e3f2fd; color: #1565c0; }
    .equip-icon { font-size: 22px; }
    .info-row { display: flex; gap: 10px; align-items: flex-start; }
    .info-row-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .info-row-content { flex: 1; }
    .info-row-label { font-size: 11px; color: var(--gray-500); margin-bottom: 2px; }
    .info-row-value { font-size: 14px; color: var(--text); line-height: 1.5; }
    .gmap-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border-radius: var(--radius-md); border: none; background: var(--green-mid); color: var(--white); font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; transition: background .18s; font-family: inherit; }
    .gmap-btn:hover { background: var(--green-dark); }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--gray-500); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 48px; color: var(--gray-500); font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-100); border-top-color: var(--green-mid); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--gray-500); border-top: 1px solid var(--gray-100); }
    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
      .modal { border-radius: var(--radius-lg); max-height: 85vh; }
      .equip-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
      .hero-stats { gap: 14px; }
      .hero-stat-num { font-size: 24px; }
      .parks-grid { grid-template-columns: 1fr; }
      .equip-grid { grid-template-columns: repeat(3, 1fr); }
      .tree-l { display: none; }
      .tree-r { right: 1%; }
      .tree-r .hero-tree-top  { width: 30px; height: 38px; }
      .tree-r .hero-tree-trunk { width: 6px; height: 13px; }
      .tree-m { right: 10%; }
      .tree-m .hero-tree-top  { width: 24px; height: 30px; }
      .tree-m .hero-tree-trunk { width: 5px; height: 10px; }
      .hero-sun { width: 52px; height: 52px; top: 12px; right: 4%; }
      .hero-cloud-1 { top: 16px; left: 4%; width: 64px; height: 20px; }
      .hero-cloud-1::before { width: 30px; height: 30px; top: -14px; left: 10px; }
      .hero-cloud-1::after  { width: 22px; height: 22px; top: -10px; left: 32px; }
      .hero-birds { display: none; }
      .hero-inner { padding: 28px 16px 44px; }
      .hero-sub { max-width: 100%; }
    }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-sun"></div>
    <div class="hero-cloud hero-cloud-1"></div>
    <div class="hero-cloud hero-cloud-2"></div>
    <div class="hero-birds">
      <svg width="80" height="30" viewBox="0 0 80 30" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.55">
        <path d="M2 10 Q7 5 12 10 Q17 5 22 10" stroke="#1a3d20" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M30 6 Q34 2 38 6 Q42 2 46 6" stroke="#1a3d20" stroke-width="1.7" stroke-linecap="round" fill="none"/>
        <path d="M54 16 Q57 13 60 16 Q63 13 66 16" stroke="#1a3d20" stroke-width="1.4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="hero-tree tree-l"><div class="hero-tree-top"></div><div class="hero-tree-trunk"></div></div>
    <div class="hero-tree tree-r"><div class="hero-tree-top"></div><div class="hero-tree-trunk"></div></div>
    <div class="hero-tree tree-m"><div class="hero-tree-top"></div><div class="hero-tree-trunk"></div></div>
    <div class="hero-inner">
      <div class="hero-badge"><span>📍</span> 埼玉県 戸田市</div>
      <h1 class="hero-title">
        戸田市の<em>公園</em>を、<br>
        かんたんに探せる
      </h1>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-num">88<small>件</small></div>
          <div class="hero-stat-label">掲載公園数</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-num">7<small>種類</small></div>
          <div class="hero-stat-label">絞り込み条件</div>
        </div>
      </div>
    </div>
  </header>

  <div class="filter-section">
    <div class="filter-inner">
      <div class="filter-row">
        <!-- エリア絞り込み -->
        <div class="filter-label">🗺️ エリアで絞り込む</div>
        <div class="filter-chips">
          <button class="area-chip active" data-area="" onclick="selectArea(this)">📍 全エリア</button>
          <button class="area-chip" data-area="戸田公園エリア" onclick="selectArea(this)">🚉 戸田公園エリア</button>
          <button class="area-chip" data-area="戸田・新曽エリア" onclick="selectArea(this)">🚉 戸田・新曽エリア</button>
          <button class="area-chip" data-area="北戸田エリア" onclick="selectArea(this)">🚉 北戸田エリア</button>
        </div>
        <hr class="filter-divider">
        <!-- 設備絞り込み -->
        <div class="filter-label">▼ 設備で絞り込む</div>
        <div class="filter-chips">
          <button class="chip" data-filter="has_swing"   onclick="toggleFilter(this)"><span class="chip-icon">🎠</span>ブランコ</button>
          <button class="chip" data-filter="has_slide"   onclick="toggleFilter(this)"><span class="chip-icon">🛝</span>すべり台</button>
          <button class="chip" data-filter="has_sandbox" onclick="toggleFilter(this)"><span class="chip-icon">🏖️</span>砂場</button>
          <button class="chip" data-filter="has_toilet"  onclick="toggleFilter(this)"><span class="chip-icon">🚻</span>トイレ</button>
          <button class="chip" data-filter="has_water"   onclick="toggleFilter(this)"><span class="chip-icon">💧</span>水遊び</button>
          <button class="chip" data-filter="has_parking" onclick="toggleFilter(this)"><span class="chip-icon">🅿️</span>駐車場</button>
          <button class="chip" data-filter="has_dog"     onclick="toggleFilter(this)"><span class="chip-icon">🐕</span>犬の散歩OK</button>
        </div>
      </div>
    </div>
  </div>

  <main class="main">
    <div class="result-bar">
      <div class="result-count">
        <strong id="count">−</strong> 件 見つかりました
      </div>
    </div>
    <div class="parks-grid" id="parksGrid">
      <div class="loading"><div class="spinner"></div>公園データを読み込み中…</div>
    </div>
  </main>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">公園名</div>
        <button class="modal-close" onclick="closeModal()" aria-label="閉じる">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 戸田市公園ガイド｜情報は現地確認済みですが変更の場合があります</p>
  </footer>

  <script>
    const SUPABASE_URL = 'https://cxqzrbghdibahedstrrv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Jceze5gKAJ6VQbZc4_p8HA_aMNPCEXa';

    let allParks = [];
    let activeFilters = new Set();
    let activeArea = '';

    const FEATURES = [
      { key: 'has_swing',   icon: '🎠', label: 'ブランコ',     cls: '' },
      { key: 'has_slide',   icon: '🛝', label: 'すべり台',     cls: '' },
      { key: 'has_sandbox', icon: '🏖️', label: '砂場',         cls: '' },
      { key: 'has_toilet',  icon: '🚻', label: 'トイレ',       cls: '' },
      { key: 'has_parking', icon: '🅿️', label: '駐車場',       cls: '' },
      { key: 'has_water',   icon: '💧', label: '水遊び',       cls: 'water' },
      { key: 'has_dog',     icon: '🐕', label: '犬の散歩OK',   cls: 'dog' },
    ];

    const MODAL_FEATURES = [
      { key: 'has_swing',       icon: '🎠', label: 'ブランコ',     cls: '' },
      { key: 'has_slide',       icon: '🛝', label: 'すべり台',     cls: '' },
      { key: 'has_sandbox',     icon: '🏖️', label: '砂場',         cls: '' },
      { key: 'has_toilet',      icon: '🚻', label: 'トイレ',       cls: '' },
      { key: 'has_parking',     icon: '🅿️', label: '駐車場',       cls: '' },
      { key: 'has_water',       icon: '💧', label: '水遊び',       cls: 'has-water' },
      { key: 'has_dog',         icon: '🐕', label: '犬の散歩OK',   cls: 'has-dog' },
      { key: 'has_convenience', icon: '🏪', label: 'コンビニ近隣', cls: '' },
    ];

    const SAMPLE_PARKS = [
      { id:1, name:'戸田公園', address:'埼玉県戸田市戸田公園', lat:35.8234, lng:139.6809, area:'戸田公園エリア', has_swing:true, has_slide:true, has_sandbox:true, has_toilet:true, has_parking:true, has_water:true, has_dog:true, notes:'広い芝生広場あり' },
    ];

    async function fetchParks() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/parks?select=*&order=name`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return Array.isArray(data) && data.length > 0 ? data : SAMPLE_PARKS;
      } catch (e) {
        console.warn('Supabase fetch failed, using sample data:', e);
        return SAMPLE_PARKS;
      }
    }

    // エリア選択（単一選択・ラジオ的な動作）
    function selectArea(btn) {
      document.querySelectorAll('.area-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeArea = btn.dataset.area;
      renderParks();
    }

    function toggleFilter(btn) {
      const key = btn.dataset.filter;
      if (activeFilters.has(key)) {
        activeFilters.delete(key);
        btn.classList.remove('active');
      } else {
        activeFilters.add(key);
        btn.classList.add('active');
      }
      renderParks();
    }

    function getFiltered() {
      let result = allParks;
      // エリアフィルター
      if (activeArea !== '') {
        result = result.filter(p => p.area === activeArea);
      }
      // 設備フィルター
      if (activeFilters.size > 0) {
        result = result.filter(p => [...activeFilters].every(f => p[f] === true));
      }
      return result;
    }

    function renderParks() {
      const filtered = getFiltered();
      document.getElementById('count').textContent = filtered.length;
      const grid = document.getElementById('parksGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔍</div><p>条件に合う公園が見つかりませんでした。<br>絞り込みを解除してお試しください。</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(p => {
        const featTags = FEATURES
          .filter(f => p[f.key])
          .map(f => `<span class="feat-tag ${f.cls}">${f.icon} ${f.label}</span>`)
          .join('');
        const areaBadge = p.area
          ? `<span class="park-area-badge">📍 ${esc(p.area)}</span>`
          : '';
        return `
          <div class="park-card" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <div class="park-card-header">
              <div class="park-name">${esc(p.name)}</div>
              <div class="park-arrow">›</div>
            </div>
            ${areaBadge}
            <div class="park-address">📍 ${esc(p.address || '住所未登録')}</div>
            ${featTags ? `<div class="park-features">${featTags}</div>` : ''}
            <button class="park-detail-btn" onclick="event.stopPropagation();openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">詳細を見る</button>
          </div>`;
      }).join('');
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function openModal(park) {
      document.getElementById('modalTitle').textContent = park.name;
      const equipHTML = MODAL_FEATURES.map(f => {
        const has = park[f.key];
        const cls = has ? (f.cls || 'has') : '';
        const opacity = has ? '' : 'style="opacity:.35"';
        return `<div class="equip-item ${cls}" ${opacity}><span class="equip-icon">${f.icon}</span>${f.label}</div>`;
      }).join('');
      const gmapUrl = park.lat && park.lng
        ? `https://www.google.com/maps/search/?api=1&query=${park.lat},${park.lng}`
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(park.name + ' 戸田市')}`;
      const areaBadgeModal = park.area
        ? `<div class="info-row">
            <span class="info-row-icon">🗺️</span>
            <div class="info-row-content">
              <div class="info-row-label">エリア</div>
              <div class="info-row-value">${esc(park.area)}</div>
            </div>
          </div>`
        : '';
      document.getElementById('modalBody').innerHTML = `
        <div class="photo-area">
          <div class="photo-area-icon">📸</div>
          <div class="photo-area-text">
            公園の写真はまだ登録されていません<br>
            <small>散歩中の写真を投稿してみんなに教えよう</small>
          </div>
          <span class="photo-area-badge">🚧 写真投稿機能 準備中</span>
        </div>
        <div>
          <div class="info-section-title">EQUIPMENT ／ 設備・特徴</div>
          <div class="equip-grid">${equipHTML}</div>
        </div>
        <div>
          <div class="info-section-title">ACCESS ／ アクセス</div>
          <div class="info-row">
            <span class="info-row-icon">📍</span>
            <div class="info-row-content">
              <div class="info-row-label">住所</div>
              <div class="info-row-value">${esc(park.address || '住所未登録')}</div>
            </div>
          </div>
          ${areaBadgeModal}
        </div>
        ${park.notes ? `
        <div class="info-row">
          <span class="info-row-icon">💬</span>
          <div class="info-row-content">
            <div class="info-row-label">メモ</div>
            <div class="info-row-value">${esc(park.notes)}</div>
          </div>
        </div>` : ''}
        <a class="gmap-btn" href="${gmapUrl}" target="_blank" rel="noopener">
          🗺️ Googleマップで経路を調べる
        </a>
      `;
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    window.addEventListener('load', async () => {
      allParks = await fetchParks();
      renderParks();
    });
  </script>
</body>
</html>
