<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公園詳細 | 戸田市公園ガイド</title>
  <meta name="description" content="">
  <!-- OGP -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="戸田市公園ガイド">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="https://koengide.com/ogp.png">
  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TY1M6QFYVZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TY1M6QFYVZ');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f5f7f4;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.7;
    }

    /* Header */
    .site-header {
      background: #2d6a4f;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .site-header a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.03em;
    }
    .site-header .back-icon {
      color: rgba(255,255,255,0.8);
      font-size: 18px;
    }

    /* Layout */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 12px 40px;
    }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }
    .breadcrumb a { color: #2d6a4f; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #ccc; }

    /* Park Header Card */
    .park-header {
      background: #fff;
      border-radius: 12px;
      padding: 18px 16px;
      margin-bottom: 12px;
      border: 1px solid #e8ede6;
    }
    .park-name {
      font-size: 22px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .area-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .address {
      font-size: 13px;
      color: #555;
      display: flex;
      gap: 5px;
      align-items: flex-start;
      margin-top: 4px;
    }

    /* Section Card */
    .section-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #e8ede6;
    }
    .section-title {
      font-size: 11px;
      font-weight: bold;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Photo */
    .park-photo {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
      display: block;
    }

    /* Description text */
    .summary-text {
      font-size: 14px;
      line-height: 1.85;
      color: #2a2a2a;
    }

    /* Equipment Grid */
    .equipment-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 8px;
    }
    .equip-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      border-radius: 8px;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
    }
    .equip-item.has { background: #ecfdf5; color: #166534; }
    .equip-item.no  { background: #f5f5f5; color: #aaa; }
    .equip-icon { font-size: 22px; }

    /* Info rows (周辺情報) */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #555; }
    .map-link {
      color: #2d6a4f;
      font-weight: bold;
      font-size: 12px;
      text-decoration: none;
      background: #ecfdf5;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .map-link:hover { background: #d1fae5; }

    /* Map area */
    .map-iframe {
      width: 100%;
      height: 200px;
      border-radius: 8px;
      border: 1px solid #e0e8e0;
      display: block;
      margin-bottom: 12px;
    }
    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2d6a4f;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
    }
    .map-btn:hover { background: #1b4332; }

    /* Note box */
    .note-box {
      background: #f0fdf4;
      border-left: 3px solid #4ade80;
      border-radius: 0 8px 8px 0;
      padding: 10px 14px;
      font-size: 13px;
      color: #166534;
      line-height: 1.7;
    }

    /* Nearby */
    .nearby-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .nearby-card {
      background: #f9faf8;
      border: 1px solid #e8ede6;
      border-radius: 8px;
      padding: 10px 12px;
      text-decoration: none;
      color: #1a1a1a;
      display: block;
      transition: background 0.15s;
    }
    .nearby-card:hover { background: #ecfdf5; }
    .nearby-name {
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 2px;
      line-height: 1.4;
    }
    .nearby-dist { font-size: 11px; color: #999; margin-bottom: 5px; }
    .nearby-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      background: #dcfce7;
      color: #166534;
      padding: 2px 7px;
      border-radius: 10px;
    }

    /* Loading / Error */
    .loading, .error {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 15px;
    }
    .error { color: #dc2626; }
  </style>
</head>
<body>

  <header class="site-header">
    <span class="back-icon">←</span>
    <a href="/">🌿 戸田市公園ガイド</a>
  </header>

  <div class="container">
    <div id="app">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://cxqzrbghdibahedstrrv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Jceze5gKAJ6VQbZc4_p8HA_aMNPCEXa';

    const params = new URLSearchParams(window.location.search);
    const parkId = params.get('id');

    async function fetchJSON(url) {
      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY
        }
      });
      return res.json();
    }

    function distance(lat1, lng1, lat2, lng2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function formatDist(m) {
      return m < 1000 ? '約' + Math.round(m) + 'm' : '約' + (m/1000).toFixed(1) + 'km';
    }

    function generateDescription(park) {
      let sentences = [];

      sentences.push(park.name + 'は、埼玉県' + park.address + 'にある公園です。');

      const equip = [];
      if (park.has_slide)   equip.push('すべり台');
      if (park.has_swing)   equip.push('ブランコ');
      if (park.has_sandbox) equip.push('砂場');
      if (equip.length > 0) {
        sentences.push(equip.join('・') + 'などの遊具が揃い、お子さまが元気に遊べます。');
      }

      if (park.has_water) {
        sentences.push('夏季には水遊びもできるため、暑い時期の定番スポットとして人気があります。');
      }

      if (park.has_toilet) {
        sentences.push('トイレが完備されているため、長時間の滞在も安心です。');
      }

      const comfort = [];
      if (park.has_shade) comfort.push('木陰が多く日差しが強い日でも涼しく過ごせます');
      if (park.has_bench) comfort.push('ベンチも設置されており休憩できます');
      if (comfort.length > 0) {
        sentences.push(comfort.join('。') + '。');
      }

      const other = [];
      if (park.has_dog)      other.push('犬の散歩にも対応しています');
      if (park.has_ballplay) other.push('ボール遊びも楽しめます');
      if (park.has_parking)  other.push('駐車場も完備しています');
      if (other.length > 0) {
        sentences.push(other.join('。') + '。');
      }

      const nearby = [];
      if (park.has_convenience)   nearby.push('コンビニ');
      if (park.near_supermarket)  nearby.push('スーパー');
      if (nearby.length > 0) {
        sentences.push('公園のすぐ近くに' + nearby.join('・') + 'があり、飲み物や食料の調達にも便利です。');
      }

      return sentences.join('');
    }

    function getTopTags(park) {
      const all = [
        [park.has_swing,   'ブランコ'],
        [park.has_slide,   'すべり台'],
        [park.has_sandbox, '砂場'],
        [park.has_toilet,  'トイレ'],
        [park.has_water,   '水遊び'],
        [park.has_parking, '駐車場'],
      ];
      return all.filter(([v]) => v).map(([, l]) => l).slice(0, 3);
    }

    function equipItem(icon, label, has) {
      return '<div class="equip-item ' + (has ? 'has' : 'no') + '">' +
        '<span class="equip-icon">' + icon + '</span>' +
        '<span>' + (has ? label : label + 'なし') + '</span>' +
        '</div>';
    }

    function buildHTML(park, nearby) {
      const desc = generateDescription(park);
      const googleMapsUrl  = 'https://www.google.com/maps/search/?api=1&query=' + park.lat + ',' + park.lng;
      const convenienceUrl = 'https://www.google.com/maps/dir/?api=1&origin=' + park.lat + ',' + park.lng + '&destination=コンビニ&travelmode=walking';
      const supermarketUrl = 'https://www.google.com/maps/dir/?api=1&origin=' + park.lat + ',' + park.lng + '&destination=スーパー&travelmode=walking';

      // Update page title / OGP / meta description
      document.title = park.name + '｜遊具・設備情報【戸田市公園ガイド】';
      document.querySelector('meta[name="description"]').content = desc.slice(0, 120);
      document.querySelector('meta[property="og:title"]').content = park.name + '｜戸田市公園ガイド';
      document.querySelector('meta[property="og:description"]').content = desc.slice(0, 120);
      if (park.photo_url) {
        document.querySelector('meta[property="og:image"]').content = park.photo_url;
      }

      // JSON-LD 構造化データ
      const amenities = [
        ['ブランコ', park.has_swing], ['すべり台', park.has_slide],
        ['砂場', park.has_sandbox], ['トイレ', park.has_toilet],
        ['水遊び', park.has_water], ['駐車場', park.has_parking],
        ['犬の散歩', park.has_dog], ['ベンチ', park.has_bench],
        ['木陰', park.has_shade], ['ボール遊び', park.has_ballplay],
      ];
      const jsonld = {
        '@context': 'https://schema.org',
        '@type': 'Park',
        'name': park.name,
        'address': {
          '@type': 'PostalAddress',
          'addressRegion': '埼玉県',
          'streetAddress': park.address
        },
        'geo': {
          '@type': 'GeoCoordinates',
          'latitude': park.lat,
          'longitude': park.lng
        },
        'amenityFeature': amenities.map(([name, val]) => ({
          '@type': 'LocationFeatureSpecification',
          'name': name,
          'value': !!val
        }))
      };
      const scriptTag = '<script type="application/ld+json">' + JSON.stringify(jsonld) + '<\/script>';

      // Nearby parks HTML
      let nearbyHTML = '';
      if (nearby.length > 0) {
        const cards = nearby.map(p =>
          '<a class="nearby-card" href="/park.html?id=' + p.id + '">' +
            '<div class="nearby-name">' + p.name + '</div>' +
            '<div class="nearby-dist">' + formatDist(p.dist) + '</div>' +
            '<div class="nearby-tags">' +
              getTopTags(p).map(t => '<span class="tag">' + t + '</span>').join('') +
            '</div>' +
          '</a>'
        ).join('');
        nearbyHTML =
          '<div class="section-card">' +
            '<div class="section-title">近くの公園（' + park.area + '）</div>' +
            '<div class="nearby-grid">' + cards + '</div>' +
          '</div>';
      }

      // 周辺情報（あり の場合のみ行を表示）
      let surroundRows = '';
      if (park.has_convenience) {
        surroundRows += '<div class="info-row">' +
          '<span class="info-label">近くにコンビニ</span>' +
          '<a href="' + convenienceUrl + '" target="_blank" rel="noopener" class="map-link">マップで見る →</a>' +
          '</div>';
      }
      if (park.near_supermarket) {
        surroundRows += '<div class="info-row">' +
          '<span class="info-label">近くにスーパー</span>' +
          '<a href="' + supermarketUrl + '" target="_blank" rel="noopener" class="map-link">マップで見る →</a>' +
          '</div>';
      }
      const surroundSection = surroundRows
        ? '<div class="section-card"><div class="section-title">周辺情報</div>' + surroundRows + '</div>'
        : '';

      // 「この公園について」は photo_url がある場合のみ
      const aboutSection = park.photo_url
        ? '<div class="section-card">' +
            '<div class="section-title">この公園について</div>' +
            '<img src="' + park.photo_url + '" alt="' + park.name + 'の写真" class="park-photo" loading="lazy">' +
            '<p class="summary-text">' + desc + '</p>' +
          '</div>'
        : '';

      // 公園メモは notes がある場合のみ
      const noteSection = park.notes
        ? '<div class="section-card">' +
            '<div class="section-title">公園メモ</div>' +
            '<div class="note-box">' + park.notes + '</div>' +
          '</div>'
        : '';

      return scriptTag +
        '<nav class="breadcrumb">' +
          '<a href="/">戸田市公園ガイド</a>' +
          '<span class="sep">/</span>' +
          '<a href="/?area=' + encodeURIComponent(park.area) + '">' + park.area + '</a>' +
          '<span class="sep">/</span>' +
          '<span>' + park.name + '</span>' +
        '</nav>' +

        '<div class="park-header">' +
          '<h1 class="park-name">' + park.name + '</h1>' +
          '<div><span class="area-badge">' + park.area + '</span></div>' +
          '<div class="address">📍 ' + park.address + '</div>' +
        '</div>' +

        aboutSection +

        '<div class="section-card">' +
          '<div class="section-title">設備・遊具</div>' +
          '<div class="equipment-grid">' +
            equipItem('🛝', 'すべり台', park.has_slide) +
            equipItem('🔄', 'ブランコ', park.has_swing) +
            equipItem('🏖', '砂場', park.has_sandbox) +
            equipItem('🚻', 'トイレ', park.has_toilet) +
            equipItem('💧', '水遊び', park.has_water) +
            equipItem('🅿', '駐車場', park.has_parking) +
            equipItem('🐕', '犬の散歩OK', park.has_dog) +
            equipItem('🌳', '木陰あり', park.has_shade) +
            equipItem('🪑', 'ベンチあり', park.has_bench) +
            equipItem('⚽', 'ボール遊び', park.has_ballplay) +
          '</div>' +
        '</div>' +

        surroundSection +

        '<div class="section-card">' +
          '<div class="section-title">アクセス・地図</div>' +
          '<iframe class="map-iframe" src="https://www.google.com/maps?q=' + park.lat + ',' + park.lng + '&hl=ja&z=16&output=embed" loading="lazy" allowfullscreen></iframe>' +
          '<a class="map-btn" href="' + googleMapsUrl + '" target="_blank" rel="noopener">📍 Googleマップで開く</a>' +
        '</div>' +

        noteSection +
        nearbyHTML;
    }

    async function init() {
      if (!parkId) {
        window.location.href = '/';
        return;
      }

      try {
        // この公園のデータを取得
        const parks = await fetchJSON(
          SUPABASE_URL + '/rest/v1/parks?id=eq.' + parkId + '&select=*'
        );
        const park = parks[0];
        if (!park) { window.location.href = '/'; return; }

        // 同エリアの近隣公園を取得
        const allArea = await fetchJSON(
          SUPABASE_URL + '/rest/v1/parks?area=eq.' + encodeURIComponent(park.area) +
          '&id=neq.' + parkId + '&select=*'
        );

        // 距離順ソートして上位4件
        const nearby = allArea
          .map(p => Object.assign({}, p, { dist: distance(park.lat, park.lng, p.lat, p.lng) }))
          .sort((a, b) => a.dist - b.dist)
          .slice(0, 4);

        document.getElementById('app').innerHTML = buildHTML(park, nearby);

      } catch(e) {
        document.getElementById('app').innerHTML =
          '<div class="error">データの読み込みに失敗しました。<br>しばらくしてから再読み込みしてください。</div>';
      }
    }

    init();
  </script>
</body>
</html>
